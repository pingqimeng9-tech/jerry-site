<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>博客 · Jerry</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --glass:rgba(255,255,255,.10); --glass-strong:rgba(255,255,255,.16); --glass-border:rgba(255,255,255,.28);
    --ink:#ffffff; --muted:#c9c6e8; --coral:#FF7A5C; --aqua:#5CE1E6; --violet:#B18CFF; --pink:#FF8CD9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; color:var(--ink); font-family:'Noto Sans SC',sans-serif; -webkit-font-smoothing:antialiased;
    background:
      linear-gradient(180deg, rgba(18,16,43,.55), rgba(18,16,43,.85)), /* 暗色蒙层，保证上层文字可读 */
      url('images/blog-bg/wallpaper.jpg') center center / cover no-repeat,
      #12102b; /* 图片没传之前的兜底底色 */
    background-attachment: fixed;
  }
  /* ★ 素材位：把你的壁纸图片传到 images/blog-bg/wallpaper.jpg 这个路径就会自动生效，
     文件名必须完全一致（包括后缀.jpg），传之前页面会显示纯色兜底背景，不会报错 */

  /* 悬浮微光粒子：小圆点缓慢漂浮+忽明忽暗，呼应壁纸的梦幻感 */
  #sparkle-field{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .sparkle{
    position:absolute; border-radius:50%; background:#fff;
    opacity:0; animation:sparkleFloat 8s ease-in-out infinite;
  }
  @keyframes sparkleFloat{
    0%{opacity:0; transform:translateY(0);}
    50%{opacity:.8;}
    100%{opacity:0; transform:translateY(-60px);}
  }

  a{color:inherit;text-decoration:none;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .serif{font-family:'Noto Serif SC',serif;}

  nav{
    display:flex; justify-content:space-between; align-items:center; padding:18px clamp(20px,5vw,56px);
    position:sticky; top:0; background:rgba(20,16,45,.45); backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px); border-bottom:1px solid var(--glass-border); z-index:50;
  }
  nav .logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;cursor:pointer;}
  nav .links{display:flex;align-items:center;gap:8px;}
  nav .links a{margin-left:6px;padding:8px 14px;border-radius:100px;font-size:14px;opacity:.75;transition:.2s;}
  nav .links a:hover{opacity:1;background:var(--glass);}
  nav .links a.active{opacity:1;background:var(--glass-strong);}
  nav .cta{
    padding:10px 20px;border-radius:100px;background:linear-gradient(120deg,var(--coral),var(--pink));
    color:#1a0f2b;font-weight:700;font-size:13.5px;box-shadow:0 8px 24px -8px #FF7A5C88;transition:.25s;
  }
  nav .cta:hover{transform:translateY(-2px);}
  @media (max-width:820px){ nav .links a{display:none;} }

  /* ================= 旋转渐变描边按钮：跟主页同款 ================= */
  @property --border-angle{ syntax:'<angle>'; inherits:false; initial-value:0deg; }
  .btn-border-wrap{ position:relative; display:inline-block; border-radius:100px; }
  .btn-border-wrap::before{
    content:"";
    position:absolute; inset:-3px; border-radius:inherit; padding:2.5px;
    background:conic-gradient(from var(--border-angle), var(--violet), transparent 35%, var(--violet) 70%, transparent 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    animation:borderSpin 3s linear infinite; pointer-events:none;
  }
  @keyframes borderSpin{ to{ --border-angle:360deg; } }
  @media (prefers-reduced-motion: reduce){ .btn-border-wrap::before{ animation:none; } }

  .shell{ display:flex; max-width:1180px; margin:32px auto 40px; gap:22px; padding:0 20px; align-items:flex-start; position:relative; z-index:1; }

  .sidebar{ width:250px; flex-shrink:0; background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(18px); border-radius:20px; padding:22px; position:sticky; top:88px; }
  .avatar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .avatar-circle{width:46px;height:46px;border-radius:50%;background:linear-gradient(120deg,var(--violet),var(--aqua));display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-weight:900;font-size:18px;color:#1a0f2b;flex-shrink:0;}
  .avatar-name{font-family:'Noto Serif SC',serif;font-weight:900;font-size:17px;}
  .avatar-tag{font-size:11px;color:var(--muted);margin-top:2px;}

  .search-box{position:relative;margin-bottom:20px;}

  /* 统计数字块 */
  .stats-row{display:flex;gap:10px;margin-bottom:16px;}
  .stat-item{flex:1;text-align:center;background:rgba(255,255,255,.05);border:1px solid var(--glass-border);border-radius:12px;padding:10px 4px;}
  .stat-num{font-size:17px;font-weight:700;color:var(--aqua);}
  .stat-label{font-size:10.5px;color:var(--muted);margin-top:2px;}

  /* 社交图标排 */
  .social-row{display:flex;gap:8px;margin-bottom:18px;}
  .social-btn{
    width:34px;height:34px;border-radius:50%;
    background:rgba(255,255,255,.06);border:1px solid var(--glass-border);
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);transition:.2s;
  }
  .social-btn:hover{background:linear-gradient(120deg,var(--violet),var(--aqua));color:#1a0f2b;transform:translateY(-2px);}
  .social-btn.text-badge{font-size:12px;font-weight:700;}
  .search-box input{
    width:100%; background:rgba(0,0,0,.3); border:1px solid var(--glass-border); border-radius:12px;
    padding:10px 14px 10px 34px; font-size:13px; color:#fff; font-family:'JetBrains Mono',monospace; outline:none;
  }
  .search-box input:focus{border-color:var(--aqua);}
  .search-box input::placeholder{color:var(--muted);}
  .search-box .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.6;}
  .search-count{font-size:11px;color:var(--aqua);margin-top:6px;font-family:'JetBrains Mono',monospace;display:none;}

  .cat-jump{display:flex;flex-direction:column;gap:4px;margin-bottom:20px;}
  .cat-jump-label, .recent-label, .archive-label{font-size:11px;color:var(--aqua);font-family:'JetBrains Mono',monospace;font-weight:700;margin-bottom:8px;letter-spacing:.05em;}
  .cat-jump a{font-size:13px;color:var(--muted);padding:6px 10px;border-radius:8px;transition:.2s;display:flex;justify-content:space-between;}
  .cat-jump a:hover{background:var(--glass);color:#fff;}
  .cat-jump a .count{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.6;}

  .recent-list{margin-bottom:20px;}
  .recent-list a{display:block;font-size:12.5px;color:var(--muted);line-height:1.6;padding:6px 0;border-bottom:1px dashed var(--glass-border);transition:.2s;}
  .recent-list a:hover{color:var(--aqua);padding-left:4px;}
  .recent-list a:last-child{border-bottom:none;}

  .archive-list a{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);padding:5px 0;transition:.2s;}
  .archive-list a:hover{color:var(--aqua);}
  .archive-list .count{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.6;}

  .main{flex:1;min-width:0;}
  .page-title{font-family:'Noto Serif SC',serif;font-weight:900;font-size:30px;margin-bottom:6px;}
  .page-sub{color:var(--muted);font-size:13px;margin-bottom:22px;}

  .tabbar{ display:flex; gap:8px; background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(16px); border-radius:100px; padding:6px; margin-bottom:30px; width:fit-content; flex-wrap:wrap; }
  .tabbar a{ padding:9px 18px; border-radius:100px; font-size:13.5px; color:var(--muted); transition:.2s; }
  .tabbar a.active{background:linear-gradient(120deg,var(--coral),var(--pink));color:#1a0f2b;font-weight:700;}
  .tabbar a:not(.active):hover{background:rgba(255,255,255,.08);color:#fff;}

  .cat-section{margin-bottom:44px;scroll-margin-top:90px;}
  .cat-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .cat-header .dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(120deg,var(--coral),var(--pink));}
  .cat-header h2{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;margin:0;}
  .cat-header .cat-count{font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

  .post-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  .post-card{ background:var(--glass); border:1px solid var(--glass-border); backdrop-filter:blur(16px); border-radius:18px; padding:22px 24px; transition:.3s; display:block; }
  .post-card:hover{transform:translateY(-4px);background:var(--glass-strong);box-shadow:0 20px 45px -20px rgba(107,92,255,.5);}
  .post-title{font-family:'Noto Serif SC',serif;font-weight:700;font-size:18px;margin-bottom:8px;}
  .post-excerpt{font-size:13.5px;color:var(--muted);line-height:1.75;margin-bottom:12px;}
  .post-meta{display:flex;gap:14px;font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;}

  .state-box{ text-align:center;padding:60px 20px;color:var(--muted); background:var(--glass);border:1px solid var(--glass-border);border-radius:18px; }
  .state-box.error{color:#FF9E8A;}
  .spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--glass-border);border-top-color:var(--aqua);margin:0 auto 14px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  mark{background:linear-gradient(120deg,var(--coral),var(--pink));color:#1a0f2b;padding:0 2px;border-radius:3px;}

  @media (max-width:900px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;position:static;}
  }

  /* ================= 手机端专属：分类栏吸顶 + 侧边栏抽屉 + 分页 ================= */
  .mobile-fab{ display:none; }
  .sidebar-backdrop{ display:none; }
  .sidebar-close{ display:none; }
  .pagination{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:30px; flex-wrap:wrap; }
  .pagination button{
    min-width:34px; height:34px; padding:0 10px; border-radius:100px; border:1px solid var(--glass-border);
    background:var(--glass); color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:13px; cursor:pointer; transition:.2s;
  }
  .pagination button:hover{background:var(--glass-strong);color:#fff;}
  .pagination button.active{background:linear-gradient(120deg,var(--coral),var(--pink));color:#1a0f2b;font-weight:700;border-color:transparent;}
  .pagination button:disabled{opacity:.3;cursor:default;}
  .pagination .ellipsis{color:var(--muted);padding:0 2px;}

  @media (max-width:760px){
    .shell{ z-index:auto; } /* 关键修复：.shell自己有z-index:1，会建立一个独立层叠上下文，把里面的
                               .sidebar(z-index:200)困住，导致外层.sidebar-backdrop(190)反而盖在sidebar上面，
                               关闭按钮点不到。手机端取消.shell的层叠上下文资格(z-index:auto)，
                               sidebar的z-index才能直接在body层级跟backdrop/fab比较，顺序正确且不影响FAB可点击 */

    /* 分类栏吸顶：钉在导航栏正下方，具体px由JS按nav实际高度算出写入 */
    .tabbar{
      position:sticky; z-index:40;
      margin:0 -20px 18px; padding:10px 20px; border-radius:0;
      width:calc(100% + 40px); overflow-x:auto; flex-wrap:nowrap;
      background:rgba(20,16,45,.75); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      border-left:none; border-right:none; border-top:none;
      scrollbar-width:none;
    }
    .tabbar::-webkit-scrollbar{display:none;}
    .tabbar a{flex-shrink:0;}

    /* 侧边栏变成从左侧滑入的抽屉，默认收起 */
    .sidebar{
      position:fixed; top:0; left:0; height:100%; width:82%; max-width:320px;
      z-index:200; border-radius:0; overflow-y:auto;
      transform:translateX(-105%); transition:transform .32s cubic-bezier(.22,1,.36,1);
      box-shadow:20px 0 50px -20px rgba(0,0,0,.6);
    }
    .sidebar.open{ transform:translateX(0); }

    .sidebar-backdrop{
      display:block; position:fixed; inset:0; z-index:190; background:rgba(8,6,20,.55);
      backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity .3s;
    }
    .sidebar-backdrop.open{ opacity:1; pointer-events:auto; }

    .sidebar-close{
      display:flex; align-items:center; justify-content:center;
      width:30px;height:30px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-border);
      color:#fff; font-size:15px; margin-bottom:14px; cursor:pointer;
    }

    /* 右下角悬浮按钮：打开侧边栏搜索/导航抽屉 */
    .mobile-fab{
      display:flex; align-items:center; justify-content:center;
      position:fixed; right:18px; bottom:22px; z-index:150;
      width:52px;height:52px;border-radius:50%;
      background:linear-gradient(135deg,var(--aqua),var(--violet));
      box-shadow:0 12px 28px -8px rgba(92,225,230,.6);
      color:#12102b; font-size:20px; border:none; cursor:pointer; transition:.25s;
    }
    .mobile-fab:active{transform:scale(.92);}
  }
</style>
</head>
<body>

<div id="sparkle-field"></div>

<nav>
  <a class="logo" href="/">JERRY.DEV</a>
  <div class="links">
    <a href="/#about">我是谁</a>
    <a href="/#timeline">经历</a>
    <a href="/#reflect">反思</a>

</nav>

<div class="shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-close" id="sidebarClose">✕</div>
    <div class="avatar-row">
      <div class="avatar-circle">J</div>
      <div>
        <div class="avatar-name">Jerry</div>
        <div class="avatar-tag mono">思维输出 · 长期记录</div>
      </div>
    </div>

    <!-- 统计数字块：替代原来打算做的公告卡片，数字从已加载的文章列表里实时算出来，不用额外接口 -->
    <div class="stats-row" id="statsRow">
      <div class="stat-item">
        <div class="stat-num mono" id="statPosts">–</div>
        <div class="stat-label">文章</div>
      </div>

    <!-- ★ 素材位：下面几个链接是占位，改成你真实的账号地址即可；
         能拿到官方logo的用了真实logo（GitHub），拿不到的先用文字/符号代替 -->
    <div class="social-row">
      <a href="https://github.com/" target="_blank" title="GitHub" class="social-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      </a>
      <a href="#" target="_blank" title="抖音" class="social-btn text-badge">抖</a>

        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>

      <a href="/api/posts" title="RSS（占位，需自行实现订阅feed）" class="social-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6.18 15.64a2.18 2.18 0 1 1 0 4.36 2.18 2.18 0 0 1 0-4.36M4 4.44v3.18c7.13 0 12.9 5.77 12.9 12.9h3.18C20.08 12 12.52 4.44 4 4.44M4 10.9v3.18a7.24 7.24 0 0 1 7.24 7.24h3.18A10.42 10.42 0 0 0 4 10.9"/></svg>

    </div>

    <div class="search-box">
      <span class="icon">🔍</span>
      <input id="search-input" type="text" placeholder="搜索文章标题/摘要..." />
      <div class="search-count mono" id="search-count"></div>
    </div>

    <div class="cat-jump" id="cat-jump">
      <div class="cat-jump-label">分类导航</div>

  <main class="main">

    <div class="tabbar mono" id="tabbar">
      <a href="#all" class="active" data-filter="all">全部</a>
    </div>

    <div id="content-area">
      <div class="state-box">
        <div class="spinner"></div>
        正在加载文章…
      </div>

</div>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<button class="mobile-fab" id="mobileFab" aria-label="打开搜索/导航">🔍</button>

<script>
let allPosts = [];
const CATEGORY_ORDER = ['技术分享', '心情随笔', '思维日记'];

/* ============ 手机端适配：判断 + 侧边栏抽屉 + 分类栏吸顶定位 ============ */
const MOBILE_BQ = window.matchMedia('(max-width:760px)');
function isMobile(){ return MOBILE_BQ.matches; }

function setupMobileChrome(){
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebarBackdrop');
  const fab = document.getElementById('mobileFab');
  const closeBtn = document.getElementById('sidebarClose');

  function openSidebar(){ sidebar.classList.add('open'); backdrop.classList.add('open'); }
  function closeSidebar(){ sidebar.classList.remove('open'); backdrop.classList.remove('open'); }

  fab.addEventListener('click', openSidebar);
  closeBtn.addEventListener('click', closeSidebar);
  backdrop.addEventListener('click', closeSidebar);

  // 分类栏吸顶：具体钉在导航栏正下方，导航栏高度会随字体/系统缩放变化，实时量出来写成sticky的top值，比写死px更稳
  const nav = document.querySelector('nav');
  const tabbar = document.getElementById('tabbar');
  function syncStickyTop(){
    tabbar.style.top = nav.offsetHeight + 'px';
  }
  syncStickyTop();
  window.addEventListener('resize', syncStickyTop);
}

async function loadPosts(){
  const contentArea = document.getElementById('content-area');
  try {
    const res = await fetch('/api/posts');
    const data = await res.json();

    if(!data.ok){
      contentArea.innerHTML = `<div class="state-box error">加载失败：${escapeHtml(data.error || '未知错误')}</div>`;
      return;
    }
    if(!data.posts || data.posts.length === 0){
      contentArea.innerHTML = `<div class="state-box">还没有发布任何文章，去 Notion 里写第一篇吧 ✍️</div>`;
      return;
    }

    allPosts = data.posts;
    buildStats(allPosts);
    buildCategoryTabs(allPosts);
    buildCategoryJump(allPosts);
    buildRecentList(allPosts);
    buildArchive(allPosts);
    setupMobileChrome();
    if(isMobile()){ renderMobilePaged(allPosts); } else { renderSections(allPosts); }

  } catch (err) {
    contentArea.innerHTML = `<div class="state-box error">网络请求失败：${escapeHtml(err.message)}</div>`;
  }
}

function buildStats(posts){
  const postsEl = document.getElementById('statPosts');
  const viewsEl = document.getElementById('statViews');
  if(!postsEl || !viewsEl) return;
  postsEl.textContent = posts.length;
  const totalViews = posts.reduce((sum, p) => sum + (p.views || 0), 0);
  viewsEl.textContent = totalViews >= 1000 ? (totalViews/1000).toFixed(1) + 'K' : totalViews;
}

function groupByCategory(posts){
  const groups = {};
  posts.forEach(p => {
    const cat = p.category || '未分类';
    if(!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });
  const orderedKeys = [
    ...CATEGORY_ORDER.filter(c => groups[c]),
    ...Object.keys(groups).filter(c => !CATEGORY_ORDER.includes(c))
  ];
  return orderedKeys.map(key => ({ category: key, posts: groups[key] }));
}

function renderSections(posts){
  const contentArea = document.getElementById('content-area');
  const sections = groupByCategory(posts);

  contentArea.innerHTML = sections.map(sec => `
    <div class="cat-section" id="cat-${slugify(sec.category)}">
      <div class="cat-header">
        <span class="dot"></span>
        <h2>${escapeHtml(sec.category)}</h2>
        <span class="cat-count mono">${sec.posts.length} 篇</span>
      </div>
      <div class="post-grid">
        ${sec.posts.map(postCardHtml).join('')}
      </div>
    </div>
  `).join('');
}

function postCardHtml(post, alreadyEscaped){
  // alreadyEscaped=true 用于搜索高亮场景：title/excerpt 已经被 highlight() 转义并插入了 <mark> 标签，
  // 这里就不能再 escapeHtml 一次，否则 <mark> 会变成字面文本"&lt;mark&gt;"显示出来，而不是真正高亮
  const title = alreadyEscaped ? (post.title || '无标题') : escapeHtml(post.title || '无标题');
  const excerpt = post.excerpt ? (alreadyEscaped ? post.excerpt : escapeHtml(post.excerpt)) : '';
  return `
    <a class="post-card" href="/post.html?id=${post.id}">
      <div class="post-title">${title}</div>
      ${excerpt ? `<div class="post-excerpt">${excerpt}</div>` : ''}
      <div class="post-meta">
        ${post.date ? `<span>📅 ${post.date}</span>` : ''}
        ${post.category ? `<span>🏷️ ${escapeHtml(post.category)}</span>` : ''}
      </div>
    </a>
  `;
}

/* ============ 手机端：分类=筛选（不是锚点跳转）+ 每页10篇分页 ============ */
const PAGE_SIZE = 10;
let mobileFilter = 'all';
let mobilePage = 1;

function renderMobilePaged(posts, page){
  mobilePage = page || 1;
  const filtered = mobileFilter === 'all' ? posts : posts.filter(p => (p.category || '未分类') === mobileFilter);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  mobilePage = Math.min(mobilePage, totalPages);
  const start = (mobilePage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  const contentArea = document.getElementById('content-area');
  if(filtered.length === 0){
    contentArea.innerHTML = `<div class="state-box">这个分类下还没有文章</div>`;
    return;
  }
  contentArea.innerHTML = `
    <div class="cat-section">
      <div class="post-grid">${pageItems.map(postCardHtml).join('')}</div>
    </div>
    ${buildPaginationHtml(mobilePage, totalPages)}
  `;

  contentArea.querySelectorAll('.pagination button[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      renderMobilePaged(allPosts, parseInt(btn.dataset.page, 10));
      document.getElementById('content-area')?.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
}

function buildPaginationHtml(page, total){
  if(total <= 1) return '';
  const pages = [];
  pages.push(1);
  if(page > 3) pages.push('...');
  for(let p = Math.max(2, page-1); p <= Math.min(total-1, page+1); p++) pages.push(p);
  if(page < total-2) pages.push('...');
  if(total > 1) pages.push(total);

  const btns = pages.map(p => p === '...'
    ? `<span class="ellipsis">…</span>`
    : `<button data-page="${p}" class="${p===page?'active':''}">${p}</button>`
  ).join('');

  return `
    <div class="pagination">
      <button data-page="${Math.max(1,page-1)}" ${page===1?'disabled':''}>‹</button>
      ${btns}
      <button data-page="${Math.min(total,page+1)}" ${page===total?'disabled':''}>›</button>
    </div>
  `;
}

function buildCategoryTabs(posts){
  const tabbar = document.getElementById('tabbar');
  const sections = groupByCategory(posts);
  const tabsHtml = sections.map(sec => `<a href="#cat-${slugify(sec.category)}" data-filter="${escapeHtml(sec.category)}">${escapeHtml(sec.category)}</a>`).join('');
  tabbar.innerHTML = `<a href="#all" class="active" data-filter="all">全部</a>` + tabsHtml;

  tabbar.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      tabbar.querySelectorAll('a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');

      if(isMobile()){
        mobileFilter = a.dataset.filter;
        renderMobilePaged(allPosts, 1);
        document.getElementById('content-area')?.scrollIntoView({behavior:'smooth', block:'start'});
        return;
      }

      if(a.dataset.filter !== 'all'){
        document.getElementById('cat-' + slugify(a.dataset.filter))?.scrollIntoView({behavior:'smooth', block:'start'});
      } else {
        document.getElementById('content-area')?.scrollIntoView({behavior:'smooth', block:'start'});
      }
    });
  });
}

function buildCategoryJump(posts){
  const el = document.getElementById('cat-jump');
  const sections = groupByCategory(posts);
  el.innerHTML = `<div class="cat-jump-label">分类导航</div>` + sections.map(sec => `
    <a href="#cat-${slugify(sec.category)}">
      <span>${escapeHtml(sec.category)}</span>
      <span class="count">${sec.posts.length}</span>
    </a>
  `).join('');
}

function buildRecentList(posts){
  const el = document.getElementById('recent-list');
  const recent = [...posts]
    .filter(p => p.date)
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .slice(0, 6);
  el.innerHTML = `<div class="recent-label">最近更新</div>` + recent.map(p => `
    <a href="/post.html?id=${p.id}">${escapeHtml(p.title || '无标题')}</a>
  `).join('');
}

function buildArchive(posts){
  const el = document.getElementById('archive-list');
  const groups = {};
  posts.forEach(p => {
    if(!p.date) return;
    const ym = p.date.slice(0,7);
    groups[ym] = (groups[ym] || 0) + 1;
  });
  const keys = Object.keys(groups).sort().reverse();
  el.innerHTML = `<div class="archive-label">归档</div>` + keys.map(ym => `
    <a href="#" data-ym="${ym}">
      <span>${ym}</span>
      <span class="count">${groups[ym]}</span>
    </a>
  `).join('');

  el.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const ym = a.dataset.ym;
      const filtered = allPosts.filter(p => p.date && p.date.slice(0,7) === ym);
      if(isMobile()){
        mobileFilter = 'all';
        renderMobilePaged(filtered, 1);
        document.getElementById('sidebar')?.classList.remove('open');
        document.getElementById('sidebarBackdrop')?.classList.remove('open');
      } else {
        renderSections(filtered);
      }
      document.getElementById('content-area')?.scrollIntoView({behavior:'smooth', block:'start'});
    });
  });
}

function setupSearch(){
  const input = document.getElementById('search-input');
  const countEl = document.getElementById('search-count');

  input.addEventListener('input', () => {
    const q = input.value.trim();
    if(!q){
      countEl.style.display = 'none';
      renderSections(allPosts);
      return;
    }
    const qLower = q.toLowerCase();
    const matched = allPosts.filter(p =>
      (p.title || '').toLowerCase().includes(qLower) ||
      (p.excerpt || '').toLowerCase().includes(qLower)
    );
    countEl.style.display = 'block';
    countEl.textContent = `找到 ${matched.length} 篇`;

    const contentArea = document.getElementById('content-area');
    if(matched.length === 0){
      contentArea.innerHTML = `<div class="state-box">没有找到匹配"${escapeHtml(q)}"的文章</div>`;
      return;
    }
    contentArea.innerHTML = `
      <div class="cat-section">
        <div class="post-grid">
          ${matched.map(p => postCardHtml({...p, title: highlight(p.title, q), excerpt: highlight(p.excerpt, q)}, true)).join('')}
        </div>
      </div>
    `;
  });
}

function highlight(text, q){
  if(!text) return text;
  const escaped = escapeHtml(text);
  const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp('(' + escapedQ + ')', 'gi'), '<mark>$1</mark>');
}

function slugify(str){
  return str.replace(/\s+/g, '-').toLowerCase();
}
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

loadPosts();
setupSearch();

/* 悬浮微光粒子：随机位置/大小/延迟生成一批小圆点，纯CSS动画驱动，性能开销很小 */
(function(){
  const field = document.getElementById('sparkle-field');
  if(!field) return;
  const COUNT = 40;
  for(let i = 0; i < COUNT; i++){
    const dot = document.createElement('div');
    dot.className = 'sparkle';
    const size = 1 + Math.random() * 2.5;
    dot.style.width = size + 'px';
    dot.style.height = size + 'px';
    dot.style.left = Math.random() * 100 + '%';
    dot.style.top = Math.random() * 100 + '%';
    dot.style.animationDuration = (5 + Math.random() * 6) + 's';
    dot.style.animationDelay = (Math.random() * 8) + 's';
    field.appendChild(dot);
  }
})();
</script>
