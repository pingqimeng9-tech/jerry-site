<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>博客列表 · Jerry</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --glass:rgba(255,255,255,.10); --glass-strong:rgba(255,255,255,.16); --glass-border:rgba(255,255,255,.28);
    --ink:#ffffff; --muted:#c9c6e8; --coral:#FF7A5C; --aqua:#5CE1E6; --violet:#B18CFF; --pink:#FF8CD9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;color:var(--ink);font-family:'Noto Sans SC',sans-serif;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(circle at 15% 20%, #6A5CFF55, transparent 45%),
      radial-gradient(circle at 85% 15%, #FF8CD955, transparent 45%),
      radial-gradient(circle at 75% 80%, #5CE1E645, transparent 45%),
      radial-gradient(circle at 20% 85%, #FF7A5C45, transparent 45%),
      linear-gradient(135deg,#12102b,#1b1440,#0e1a3a,#1a1030);
    background-size:200% 200%,200% 200%,200% 200%,200% 200%,400% 400%;
    animation:bgshift 26s ease-in-out infinite;
  }
  @keyframes bgshift{
    0%{background-position:0% 0%,100% 0%,100% 100%,0% 100%,0% 50%;}
    50%{background-position:40% 60%,60% 40%,40% 60%,60% 40%,100% 50%;}
    100%{background-position:0% 0%,100% 0%,100% 100%,0% 100%,0% 50%;}
  }
  a{text-decoration:none;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* 导航与搜索栏 */
  nav{
    display:flex;justify-content:space-between;align-items:center;padding:18px clamp(20px,5vw,56px);
    position:sticky;top:0;background:rgba(20,16,45,.45);backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--glass-border);z-index:50;
    gap: 16px; flex-wrap: wrap;
  }
  nav .logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#fff;}
  
  .search-container { flex: 1; max-width: 400px; position: relative; }
  .search-input {
    width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
    padding: 10px 16px; border-radius: 100px; color: #fff; font-size: 14px;
    font-family: inherit; outline: none; transition: 0.2s;
  }
  .search-input:focus { background: var(--glass-strong); border-color: var(--aqua); }
  .search-input::placeholder { color: var(--muted); }

  .shell{ max-width: 800px; margin: 0 auto; padding: 48px clamp(20px,5vw,56px); }

  /* 文章列表卡片 */
  .post-list { display: flex; flex-direction: column; gap: 20px; }
  .post-card {
    display: block; background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(18px); border-radius: 16px; padding: 24px 28px;
    transition: all 0.25s ease;
  }
  .post-card:hover { transform: translateY(-4px); background: var(--glass-strong); border-color: var(--aqua); }
  
  .p-title {
    font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 20px;
    color: #fff; margin: 0 0 12px 0; line-height: 1.4;
  }
  .p-excerpt {
    font-size: 14px; color: #e8e6fb; line-height: 1.7; margin: 0 0 16px 0;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    opacity: 0.85;
  }
  .p-meta { display: flex; gap: 14px; font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; flex-wrap: wrap; align-items: center; }
  .p-meta .tag { background: rgba(255,255,255,.06); border: 1px solid var(--glass-border); padding: 2px 10px; border-radius: 100px; }

  /* 状态展示区 */
  .state-box{text-align:center;padding:60px 20px;color:var(--muted);}
  .state-box.error{color:#FF9E8A;}
  .spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--glass-border);border-top-color:var(--aqua);margin:0 auto 14px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:600px){
    nav{ padding:16px 18px; }
    .shell{ padding:28px 16px 60px; }
    .post-card{ padding:20px; border-radius:14px; }
    .p-title{ font-size: 18px; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">JERRY.DEV</a>
  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="搜索文章标题或正文内容..." autocomplete="off">
  </div>
</nav>

<div class="shell">
  <div id="list-container" class="post-list">
    <div class="state-box">
      <div class="spinner"></div>
      正在加载文章列表…
    </div>
  </div>
</div>

<script>
let allPosts = [];

async function loadPosts(){
  const container = document.getElementById('list-container');
  
  try {
    // 【注意】这里请替换为您实际获取所有文章列表的 API 路径
    const res = await fetch('/api/posts'); 
    const data = await res.json();

    if(!data.ok){
      container.innerHTML = `<div class="state-box error">加载失败：${escapeHtml(data.error || '未知错误')}</div>`;
      return;
    }

    allPosts = data.posts || [];
    renderPosts(allPosts);

  } catch (err) {
    container.innerHTML = `<div class="state-box error">网络请求失败：${escapeHtml(err.message)}</div>`;
  }
}

function renderPosts(posts) {
  const container = document.getElementById('list-container');
  
  if(posts.length === 0){
    container.innerHTML = `<div class="state-box">没有找到相关的文章 🍃</div>`;
    return;
  }

  const html = posts.map(post => {
    // 构建前往文章详情页的链接，假设单页路由为 /post.html?id=xxx
    const link = `/post.html?id=${encodeURIComponent(post.id)}`;
    
    // 取 markdown 正文前缀作为摘要预览。如果您的 Notion 接口直接返回了 excerpt 字段，可替换为 post.excerpt
    const rawContent = post.markdown || post.content || '';
    const excerpt = rawContent.replace(/[#*`\n>\[\]]/g, ' ').substring(0, 120).trim() + (rawContent.length > 120 ? '...' : '');

    return `
      <a href="${link}" class="post-card">
        <h2 class="p-title">${escapeHtml(post.title || '无标题')}</h2>
        <div class="p-excerpt">引言 ${escapeHtml(excerpt)}</div>
        <div class="p-meta">
          ${post.date ? `<span>📅 ${escapeHtml(post.date)}</span>` : ''}
          ${post.category ? `<span class="tag">🏷️ ${escapeHtml(post.category)}</span>` : ''}
        </div>
      </a>
    `;
  }).join('');

  container.innerHTML = html;
}

// 监听搜索输入，实时过滤（匹配标题和正文）
document.getElementById('searchInput').addEventListener('input', (e) => {
  const keyword = e.target.value.toLowerCase().trim();
  
  if (!keyword) {
    renderPosts(allPosts);
    return;
  }

  const filteredPosts = allPosts.filter(post => {
    const titleMatch = (post.title || '').toLowerCase().includes(keyword);
    // 这里匹配正文，确保搜索能搜到文章内部的字句
    const contentMatch = (post.markdown || post.content || '').toLowerCase().includes(keyword);
    return titleMatch || contentMatch;
  });

  renderPosts(filteredPosts);
});

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

// 页面加载完毕后立即拉取数据
loadPosts();
</script>

</body>
</html>
