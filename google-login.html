<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 · Jerry</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --glass:rgba(255,255,255,.10); --glass-strong:rgba(255,255,255,.16); --glass-border:rgba(255,255,255,.28);
    --ink:#ffffff; --muted:#c9c6e8; --coral:#FF7A5C; --aqua:#5CE1E6; --violet:#B18CFF; --pink:#FF8CD9;
  }
  *{box-sizing:border-box;}

  /* ================= 背景：跟 blog.html 同一套（图片轮播 + 兜底动态渐变），保持全站视觉一致 ================= */
  body{
    margin:0; min-height:100vh; color:var(--ink); font-family:'Noto Sans SC',sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
    background:
      radial-gradient(circle at 15% 20%, #6A5CFF55, transparent 45%),
      radial-gradient(circle at 85% 15%, #FF8CD955, transparent 45%),
      radial-gradient(circle at 75% 80%, #5CE1E645, transparent 45%),
      radial-gradient(circle at 20% 85%, #FF7A5C45, transparent 45%),
      linear-gradient(135deg,#12102b,#1b1440,#0e1a3a,#1a1030);
    background-size:200% 200%,200% 200%,200% 200%,200% 200%,400% 400%;
    animation:bgshift 26s ease-in-out infinite;
  }
  @keyframes bgshift{
    0%{background-position:0% 0%,100% 0%,100% 100%,0% 100%,0% 50%;}
    50%{background-position:40% 60%,60% 40%,40% 60%,60% 40%,100% 50%;}
    100%{background-position:0% 0%,100% 0%,100% 100%,0% 100%,0% 50%;}
  }
  .bg-wrapper { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: #111115; }
  .bg-layer {
    position: absolute; inset: -24px; background-size: cover; background-position: center;
    filter: blur(3.5px) saturate(1.05) brightness(0.95);
    transform: scale(1.08); opacity: 0; transition: opacity 3.5s ease-in-out;
  }
  .bg-layer.active { opacity: 1; }
  .bg-overlay {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.45) 100%);
  }

  a{color:inherit;text-decoration:none;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ================= 简化版导航（跟blog同logo/字体，登录页不需要一整排链接） ================= */
  nav{
    display:flex; justify-content:space-between; align-items:center; padding:18px clamp(20px,5vw,56px);
    position:relative; z-index:20;
  }
  nav .logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#fff;}
  nav .back{
    font-size:13px; color:var(--muted); padding:8px 14px; border-radius:100px; transition:.2s;
    border:1px solid var(--glass-border); background:var(--glass);
  }
  nav .back:hover{ background:var(--glass-strong); color:#fff; }

  /* ================= 登录卡片舞台 ================= */
  .stage{
    min-height:calc(100vh - 78px);
    display:flex; align-items:center; justify-content:center;
    padding:40px 20px 60px; position:relative; z-index:1;
    perspective:1200px;
  }

  /* 卡片本体：鼠标移动时做3D倾斜，鼠标移开回正，都是CSS transition，JS只负责算角度 */
  .login-card{
    position:relative; width:min(380px, 100%);
    background:var(--glass); border:1px solid var(--glass-border);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-radius:24px; padding:44px 34px 38px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.55);
    transform-style:preserve-3d;
    transition:transform .35s cubic-bezier(.22,1,.36,1), box-shadow .35s ease;
    animation:cardIn .7s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes cardIn{
    0%{ opacity:0; transform:translateY(26px) scale(.96); }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  .login-card:hover{
    box-shadow:0 40px 90px -20px rgba(0,0,0,.65);
  }
  /* 跟着鼠标走的柔光光斑，营造"卡片在发光互动"的感觉，位置由JS写进CSS变量 --mx/--my */
  .login-card::before{
    content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:radial-gradient(240px circle at var(--mx,50%) var(--my,20%), rgba(255,255,255,.16), transparent 70%);
    opacity:0; transition:opacity .3s ease; mix-blend-mode:screen;
  }
  .login-card:hover::before{ opacity:1; }

  .login-badge{
    width:56px; height:56px; border-radius:16px; margin:0 auto 22px;
    background:linear-gradient(135deg,var(--violet),var(--aqua));
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif SC',serif; font-weight:900; font-size:22px; color:#1a0f2b;
    box-shadow:0 12px 26px -8px rgba(177,140,255,.55);
    transform:translateZ(30px);
  }
  .login-title{
    font-family:'Noto Serif SC',serif; font-weight:900; font-size:22px; text-align:center;
    margin-bottom:8px; transform:translateZ(24px);
  }
  .login-sub{
    font-size:13px; color:var(--muted); text-align:center; line-height:1.7; margin-bottom:30px;
    transform:translateZ(18px);
  }

  .google-btn{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:13px 18px; border-radius:100px; cursor:pointer;
    background:#ffffff; color:#3c4043; font-size:14.5px; font-weight:600;
    border:1px solid rgba(255,255,255,.6);
    box-shadow:0 14px 30px -10px rgba(0,0,0,.4);
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    transform:translateZ(28px);
  }
  .google-btn:hover{ transform:translateZ(28px) translateY(-2px); box-shadow:0 18px 36px -10px rgba(0,0,0,.5); filter:brightness(1.03); }
  .google-btn:active{ transform:translateZ(28px) translateY(0) scale(.98); }
  .google-btn svg{ width:19px; height:19px; flex-shrink:0; }

  .login-divider{
    display:flex; align-items:center; gap:12px; margin:26px 0 18px;
    font-size:11px; color:var(--muted); opacity:.6; transform:translateZ(14px);
  }
  .login-divider::before, .login-divider::after{
    content:''; flex:1; height:1px; background:var(--glass-border);
  }

  .login-footnote{
    text-align:center; font-size:11.5px; color:var(--muted); opacity:.75; line-height:1.7;
    transform:translateZ(10px);
  }
  .login-footnote a{ color:var(--aqua); }

  .login-status{
    margin-top:18px; text-align:center; font-size:11.5px; color:var(--muted);
    font-family:'JetBrains Mono',monospace; opacity:.7; word-break:break-all;
    transform:translateZ(10px);
  }

  @media (max-width:480px){
    .login-card{ padding:38px 24px 32px; }
  }
</style>
</head>
<body>

<div class="bg-wrapper">
  <div id="bg-layer-1" class="bg-layer"></div>
  <div id="bg-layer-2" class="bg-layer"></div>
</div>
<div class="bg-overlay"></div>

<nav>
  <a class="logo" href="/">JERRY.DEV</a>
  <a class="back" href="/blog.html">← 返回博客</a>
</nav>

<div class="stage">
  <div class="login-card" id="loginCard">
    <div class="login-badge">J</div>
    <div class="login-title">欢迎回来</div>
    <div class="login-sub">登录后可以同步你的打卡记录、桌宠状态<br/>和积分，换设备也不会丢</div>

    <a class="google-btn" id="googleLoginBtn" href="https://jerry-site-phi.vercel.app/auth/google/callback">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      使用 Google 继续
    </a>

    <div class="login-divider">OAuth · 安全登录</div>
    <div class="login-footnote">
      继续即代表你同意本站的<br/>使用条款与隐私说明
    </div>
    <div class="login-status" id="loginStatus"></div>
  </div>
</div>

<script>
  /* ================= 卡片鼠标跟随倾斜 + 光斑效果 ================= */
  (function(){
    const card = document.getElementById('loginCard');
    const MAX_TILT = 8; // 倾斜角度上限，别太夸张

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width;  // 0~1
      const py = (e.clientY - rect.top) / rect.height;  // 0~1
      const rotateY = (px - 0.5) * MAX_TILT * 2;
      const rotateX = (0.5 - py) * MAX_TILT * 2;
      card.style.transform = `translateY(-2px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      card.style.setProperty('--mx', (px * 100) + '%');
      card.style.setProperty('--my', (py * 100) + '%');
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = 'translateY(0) rotateX(0) rotateY(0)';
    });

    // 触屏没有鼠标悬停，给个轻微的呼吸感代替，别让卡片在手机上死气沉沉
    if(window.matchMedia('(hover:none)').matches){
      card.style.animation = 'cardIn .7s cubic-bezier(.22,1,.36,1) both, cardBreathe 5s ease-in-out 1s infinite';
      const styleEl = document.createElement('style');
      styleEl.textContent = '@keyframes cardBreathe{0%,100%{transform:translateY(0) rotateX(0) rotateY(0);}50%{transform:translateY(-4px) rotateX(1deg) rotateY(-1.5deg);}}';
      document.head.appendChild(styleEl);
    }
  })();

  /* ================= Google 登录按钮：目前直接指向回调地址占位，方便你接下来接 Google OAuth 客户端配置 ================= */
  (function(){
    const btn = document.getElementById('googleLoginBtn');
    const statusEl = document.getElementById('loginStatus');
    const CALLBACK_URL = 'https://jerry-site-phi.vercel.app/auth/google/callback';

    // 如果这个页面本身就是Google跳回来时打到的callback（带着code/state参数），
    // 说明OAuth后端还没接好，先给个友好提示，不要让用户对着一个裸的JSON/报错页面发呆
    const params = new URLSearchParams(window.location.search);
    if(params.has('code') || params.has('error')){
      statusEl.textContent = params.has('error')
        ? '登录被取消或出错了，可以再试一次'
        : '正在处理登录信息…（后端 /auth/google/callback 接好之后这里会自动跳转）';
    }

    btn.addEventListener('click', () => {
      statusEl.textContent = '跳转到 ' + CALLBACK_URL + ' …';
    });
  })();

  /* ================= 背景图片轮播：跟 blog.html 用同一份 manifest，没有素材就安静地用CSS兜底渐变 ================= */
  async function initBgCarousel() {
    const layer1 = document.getElementById('bg-layer-1');
    const layer2 = document.getElementById('bg-layer-2');
    if (!layer1 || !layer2) return;
    try {
      const res = await fetch('images/bg/manifest.json');
      if(!res.ok) return;
      const images = await res.json();
      if (!images || images.length === 0) return;

      document.body.style.animation = 'none'; // 有真实背景图时关掉兜底渐变，避免视觉打架

      let currentIndex = 0;
      let currentLayer = layer1;
      let nextLayer = layer2;
      images.sort(() => Math.random() - 0.5);

      function changeBackground() {
        const imgUrl = `images/bg/${images[currentIndex]}`;
        const imgObj = new Image();
        imgObj.src = imgUrl;
        imgObj.onload = () => {
          nextLayer.style.backgroundImage = `url('${imgUrl}')`;
          nextLayer.classList.add('active');
          currentLayer.classList.remove('active');
          [currentLayer, nextLayer] = [nextLayer, currentLayer];
          currentIndex = (currentIndex + 1) % images.length;
        };
      }
      changeBackground();
      if(images.length > 1) setInterval(changeBackground, 10000);
    } catch (err) {
      // 没有素材/加载失败：安静地保留CSS兜底渐变，不报错
    }
  }
  window.addEventListener('DOMContentLoaded', initBgCarousel);
</script>

</body>
</html>
